<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
  <rect width="600" height="200" fill="transparent"/>

  <!-- Icon mark -->
  <rect x="20" y="40" width="120" height="120" rx="20" fill="#1a1a1a"/>
  <circle cx="80" cy="100" r="36" fill="none" stroke="#ffffff" stroke-width="3"/>
  <line x1="80" y1="100" x2="80" y2="73" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="80" y1="100" x2="100" y2="109" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="80" cy="100" r="3" fill="#ffffff"/>
  <!-- Queue lines -->
  <line x1="152" y1="85" x2="208" y2="85" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="152" y1="100" x2="208" y2="100" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="152" y1="115" x2="190" y2="115" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" opacity="0.35"/>

  <!-- Wordmark -->
  <text x="220" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="68" font-weight="600" letter-spacing="-2" fill="#1a1a1a">prompt</text>
  <text x="519" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="68" font-weight="600" letter-spacing="-2" fill="#D85A30">q</text>

  <!-- Tagline -->
  <text x="222" y="148" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="400" letter-spacing="0.04em" fill="#888888">keep your flow</text>
</svg>
