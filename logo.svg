<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <rect width="1200" height="500" fill="#ffffff"/>

  <!-- Icon mark — left side, vertically centered -->
  <rect x="260" y="150" width="160" height="160" rx="28" fill="#1a1a1a"/>
  <line x1="298" y1="205" x2="382" y2="205" stroke="#ffffff" stroke-width="11" stroke-linecap="round"/>
  <line x1="298" y1="233" x2="382" y2="233" stroke="#ffffff" stroke-width="11" stroke-linecap="round"/>
  <line x1="298" y1="261" x2="355" y2="261" stroke="#ffffff" stroke-width="11" stroke-linecap="round" opacity="0.4"/>

  <!-- Wordmark — right of icon, well separated -->
  <text x="455" y="268"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="130"
    font-weight="600"
    letter-spacing="-4"
    fill="#1a1a1a">prompt<tspan fill="#D85A30">q</tspan></text>

  <!-- Tagline — centered under the whole lockup -->
  <text x="600" y="360"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="26"
    font-weight="400"
    letter-spacing="4"
    text-anchor="middle"
    fill="#aaaaaa">keep your flow</text>
</svg>
