<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <rect width="1200" height="300" fill="#ffffff"/>

  <!-- Icon mark -->
  <rect x="340" y="60" width="180" height="180" rx="32" fill="#1a1a1a"/>
  <line x1="385" y1="120" x2="475" y2="120" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
  <line x1="385" y1="150" x2="475" y2="150" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
  <line x1="385" y1="180" x2="448" y2="180" stroke="#ffffff" stroke-width="12" stroke-linecap="round" opacity="0.4"/>

  <!-- Wordmark -->
  <text x="600" y="175"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="130"
    font-weight="600"
    letter-spacing="-4"
    text-anchor="middle"
    fill="#1a1a1a">prompt<tspan fill="#D85A30">q</tspan></text>

  <!-- Tagline -->
  <text x="600" y="228"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="28"
    font-weight="400"
    letter-spacing="3"
    text-anchor="middle"
    fill="#aaaaaa">keep your flow</text>
</svg>
