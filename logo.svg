<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <rect width="1200" height="400" fill="#ffffff"/>

  <!-- Icon mark — queue lines in a dark square -->
  <rect x="60" y="80" width="240" height="240" rx="40" fill="#1a1a1a"/>
  <!-- Three queue lines suggesting prompts waiting -->
  <line x1="110" y1="155" x2="250" y2="155" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
  <line x1="110" y1="200" x2="250" y2="200" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
  <line x1="110" y1="245" x2="205" y2="245" stroke="#ffffff" stroke-width="14" stroke-linecap="round" opacity="0.4"/>

  <!-- Wordmark -->
  <text x="340" y="268"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="180"
    font-weight="600"
    letter-spacing="-6"
    fill="#1a1a1a">prompt<tspan fill="#D85A30">q</tspan></text>

  <!-- Tagline -->
  <text x="344" y="320"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="36"
    font-weight="400"
    letter-spacing="2"
    fill="#aaaaaa">keep your flow</text>
</svg>
